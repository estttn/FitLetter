name: Deploy main to production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy on server (webhook, no SSH)
        env:
          HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
          HOOK_TOKEN: ${{ secrets.DEPLOY_HOOK_TOKEN }}
        run: |
          if [ -z "$HOOK_URL" ] || [ -z "$HOOK_TOKEN" ]; then
            echo "::error::Add repository secrets DEPLOY_HOOK_URL and DEPLOY_HOOK_TOKEN (see README)."
            exit 1
          fi
          curl -fsS -X POST \
            -H "Authorization: Bearer $HOOK_TOKEN" \
            "$HOOK_URL"
